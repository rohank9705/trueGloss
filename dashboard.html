<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | True Gloss</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- THE FRONT DOOR BOUNCER -->
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        window.location.replace("login.html"); 
      }
    </script>
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      
      <!-- SIDEBAR -->
      <aside class="admin-sidebar">
        <a href="index.html">
          <img src="images/true-gloss-logo.png" alt="True Gloss Logo" class="header__logo-img" />
        </a>
        <nav class="admin-nav">
          <a href="dashboard.html" class="admin-nav__link admin-nav__link--active">Dashboard</a>
          <a href="manage-packages.html" class="admin-nav__link">Manage Packages</a>
          <a href="index.html" class="admin-nav__link admin-nav__link--logout">Log Out</a>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-header__greeting">
            <h1>Welcome back!</h1>
            <p>Here is what is happening with your services today.</p>
          </div>
        </header>

        <section class="admin-stats">
          <!-- Dynamic Active Packages Card -->
          <div class="admin-card">
            <h3>Active Packages</h3>
            <p class="admin-card__number" id="active-pkg-count">...</p>
          </div>
          
          <!-- Dynamic Recent Enquiries Card -->
          <div class="admin-card">
            <h3>Recent Enquiries</h3>
            <ul id="enquiries-list" style="list-style: none; padding: 0; margin-top: 10px; line-height: 1.6;">
              <li>Loading...</li>
            </ul>
          </div>
        </section>
      </main>
    </div>

    <!-- JAVASCRIPT -->
    <script>
      const loadDashboardStats = async () => {
        try {
            const response = await fetch("https://truegloss.onrender.com/api/packages");
            const packages = await response.json();
            const activeCount = packages.filter(pkg => pkg.status === "active").length;
            document.getElementById("active-pkg-count").innerText = activeCount;
        } catch (error) {
            console.error("Error loading stats:", error);
            document.getElementById("active-pkg-count").innerText = "0";
        }
      };

      const loadEnquiries = async () => {
        try {
            const response = await fetch("https://truegloss.onrender.com/api/enquiries");
            const enquiries = await response.json();
            const list = document.getElementById("enquiries-list");
            
            list.innerHTML = ""; 

            if (enquiries.length === 0) {
                list.innerHTML = "<li>No recent enquiries.</li>";
                return;
            }

            enquiries.slice(0, 5).forEach(enq => {
                const li = document.createElement("li");
                li.style.borderBottom = "1px solid #eee";
                li.style.paddingBottom = "15px";
                li.style.marginBottom = "15px";
                
                const date = new Date(enq.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); 
                const departmentBadge = enq.department ? enq.department.toUpperCase() : 'GENERAL';
                const carText = enq.car ? enq.car : 'Vehicle not specified';
                
                li.innerHTML = `
                  <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px;">
                    <strong style="font-size: 1.1em;">${enq.name}</strong> 
                    <span style="font-size: 0.85em; color: gray;">${date}</span>
                  </div>
                  
                  <div style="font-size: 0.85em; margin-bottom: 8px;">
                    <span style="background-color: #e0f2fe; color: #0284c7; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-right: 8px;">
                      ${departmentBadge}
                    </span>
                    <a href="mailto:${enq.email}" style="color: #555; text-decoration: none;">${enq.email}</a>
                  </div>
                  
                  <div style="font-size: 0.9em; font-weight: 600; color: #333; margin-bottom: 4px;">
                    ${carText}
                  </div>
                  
                  <p style="font-size: 0.9em; color: #444; background: #f9f9f9; padding: 10px; border-radius: 6px; border-left: 3px solid #ccc; margin: 0; line-height: 1.4;">
                    "${enq.message}"
                  </p>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error("Error loading enquiries:", error);
            document.getElementById("enquiries-list").innerHTML = "<li>Unable to load enquiries.</li>";
        }
      };

      loadDashboardStats();
      loadEnquiries();
    </script>
  </body>
</html>
