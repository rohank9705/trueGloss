<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | True Gloss</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <a href="index.html">
          <img
            src="images/true-gloss-logo.png"
            alt="True Gloss Detailing Logo"
            class="header__logo-img"
          />
        </a>
        <nav class="admin-nav">
          <a href="#" class="admin-nav__link admin-nav__link--active"
            >Dashboard</a
          >
          <a href="#" class="admin-nav__link">Manage Packages</a>
          <a href="#" class="admin-nav__link">Pricing & Settings</a>
          <a href="index.html" class="admin-nav__link admin-nav__link--logout"
            >Log Out</a
          >
        </nav>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-header__greeting">
            <h1>Welcome back, <span id="admin-name"></span>!</h1>
            <p>Here is what is happening with your services today.</p>
          </div>
          <button class="btn btn--primary" id="openModalBtn">
            + Add New Package
          </button>
        </header>

        <section class="admin-stats">
          <div class="admin-card">
            <h3>Active Packages</h3>
            <p class="admin-card__number">4</p>
          </div>
          <div class="admin-card">
            <h3>Maintenance Subs</h3>
            <p class="admin-card__number">12</p>
          </div>
          <div class="admin-card">
            <h3>Recent Enquiries</h3>
            <p class="admin-card__number">3</p>
          </div>
        </section>

        <section class="admin-content">
          <div class="admin-card">
            <h2>Current Valeting Menu</h2>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Package Name</th>
                  <th>Base Price</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="packageTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <div class="admin-modal" id="addPackageModal">
      <div class="admin-modal__content">
        <div class="admin-modal__header">
          <h2>Create New Package</h2>
          <button class="admin-modal__close" id="closeModalBtn">&times;</button>
        </div>

        <form action="#" method="POST" class="admin-form">
          <div class="admin-form__group">
            <label for="pkg-category">Category</label>
            <select id="pkg-category" class="admin-form__input">
              <option value="valeting">Valeting Menu</option>
              <option value="detailing">Detailing Menu</option>
            </select>
          </div>

          <div class="admin-form__group">
            <label for="pkg-name">Package Name</label>
            <input
              type="text"
              id="pkg-name"
              class="admin-form__input"
              placeholder="e.g. Ceramic Coating"
              required
            />
          </div>

          <div class="admin-form__group">
            <label for="pkg-price">Base Price (£)</label>
            <input
              type="number"
              id="pkg-price"
              class="admin-form__input"
              placeholder="e.g. 150.00"
              required
            />
          </div>

          <div class="admin-form__group">
            <label for="pkg-desc">Description & Features</label>
            <textarea
              id="pkg-desc"
              rows="4"
              class="admin-form__input admin-form__textarea"
              placeholder="List the core features of this wash..."
            ></textarea>
          </div>

          <div class="admin-form__group">
            <label for="pkg-status">Status</label>
            <select id="pkg-status" class="admin-form__input">
              <option value="active">Live / Visible to Customers</option>
              <option value="draft">Draft / Hidden</option>
            </select>
          </div>

          <div class="admin-form__actions">
            <button type="button" class="btn" id="cancelModalBtn">
              Cancel
            </button>
            <button type="submit" class="btn btn--primary">Save Package</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const modal = document.getElementById("addPackageModal");
      const openBtn = document.getElementById("openModalBtn");
      const closeBtn = document.getElementById("closeModalBtn");
      const cancelBtn = document.getElementById("cancelModalBtn");
      const form = document.querySelector(".admin-form");

      // We add this variable to track if we are editing or creating
      let currentEditId = null;

      // This checks if the user has been "authorized"
      // For now, check if they have a session or flag in their browser storage
      if (!localStorage.getItem("isLoggedIn")) {
        window.location.href = "login.html"; // Kick them back to login if they aren't authorized
      }

      // ----------------------------------------------------
      // OPEN/CLOSE MODAL & RESET LOGIC
      // ----------------------------------------------------
      const closeModal = () => {
        modal.classList.remove("admin-modal--active");
        form.reset();
        currentEditId = null; // Clear the ID when closing
        document.querySelector(".admin-modal__header h2").innerText =
          "Create New Package";
      };

      openBtn.addEventListener("click", () => {
        currentEditId = null; // Ensure it's empty for a new package
        document.querySelector(".admin-modal__header h2").innerText =
          "Create New Package";
        modal.classList.add("admin-modal--active");
      });

      closeBtn.addEventListener("click", closeModal);
      cancelBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      const tableBody = document.getElementById("packageTableBody");

      // ----------------------------------------------------
      // FETCH & DISPLAY ALL PACKAGES (Unchanged)
      // ----------------------------------------------------
      const loadPackages = async () => {
        try {
          const response = await fetch("/api/packages");
          const packages = await response.json();
          tableBody.innerHTML = "";
          packages.forEach((pkg) => {
            const statusClass =
              pkg.status === "active" ? "status--active" : "status--draft";
            const statusText = pkg.status === "active" ? "Live" : "Draft";
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${pkg.name}</td>
                        <td>£${parseFloat(pkg.price).toFixed(2)}</td>
                        <td><span class="status ${statusClass}">${statusText}</span></td>
                        <td>
                            <a href="#" class="action-link" onclick="editPackage(${pkg.id})">Edit</a> | 
                            <a href="#" class="action-link delete" onclick="deletePackage(${pkg.id})">Delete</a>
                        </td>
                    `;
            tableBody.appendChild(row);
          });
        } catch (error) {
          console.error("Error loading packages:", error);
        }
      };
      loadPackages();

      // ----------------------------------------------------
      // THE DELETE LOGIC (Unchanged)
      // ----------------------------------------------------
      const deletePackage = async (id) => {
        const isConfirmed = confirm(
          "Are you sure you want to delete this package?",
        );
        if (!isConfirmed) return;
        try {
          await fetch(`/api/packages/${id}`, { method: "DELETE" });
          loadPackages();
        } catch (error) {
          console.error("Error deleting:", error);
        }
      };

      // ----------------------------------------------------
      // THE NEW EDIT LOGIC
      // ----------------------------------------------------
      // ----------------------------------------------------
      // THE EDIT LOGIC
      // ----------------------------------------------------
      const editPackage = async (id) => {
        try {
          // 1. Fetch the specific package data
          const response = await fetch(`/api/packages/${id}`);
          const pkg = await response.json();

          // 2. Pre-fill the form with ALL the current data
          document.getElementById("pkg-name").value = pkg.name;
          document.getElementById("pkg-price").value = pkg.price;
          document.getElementById("pkg-desc").value = pkg.description;
          document.getElementById("pkg-status").value = pkg.status;
          document.getElementById("pkg-category").value = pkg.category; // <-- Added here safely!

          // 3. Set the global variable and change the title
          currentEditId = id;
          document.querySelector(".admin-modal__header h2").innerText =
            "Edit Package";

          // 4. Open the modal
          modal.classList.add("admin-modal--active");
        } catch (error) {
          console.error("Error fetching package for edit:", error);
        }
      };

      // ----------------------------------------------------
      // THE SMART FORM SUBMISSION LOGIC
      // ----------------------------------------------------
      // ----------------------------------------------------
      // THE SMART FORM SUBMISSION LOGIC
      // ----------------------------------------------------
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Grab the final values from the text boxes right before sending
        const packageData = {
          name: document.getElementById("pkg-name").value,
          price: document.getElementById("pkg-price").value,
          description: document.getElementById("pkg-desc").value,
          status: document.getElementById("pkg-status").value,
          category: document.getElementById("pkg-category").value, // <-- Added here!
        };

        try {
          // Decide if we are POSTing (new) or PUTting (editing) based on currentEditId
          const url = currentEditId
            ? `/api/packages/${currentEditId}`
            : "/api/packages";
          const method = currentEditId ? "PUT" : "POST";

          await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(packageData),
          });

          closeModal();
          loadPackages();
        } catch (error) {
          console.error("Server communication error:", error);
        }
      });
    </script>
  </body>
</html>
