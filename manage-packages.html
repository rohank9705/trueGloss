<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Packages | True Gloss Admin</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- THE FRONT DOOR BOUNCER -->
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        window.location.replace("login.html"); 
      }
    </script>
  </head>
  <body class="admin-body">
    <div class="admin-layout">
      
      <!-- SIDEBAR -->
      <aside class="admin-sidebar">
        <a href="index.html">
          <img src="images/true-gloss-logo.png" alt="True Gloss Logo" class="header__logo-img" />
        </a>
        <nav class="admin-nav">
          <a href="dashboard.html" class="admin-nav__link">Dashboard</a>
          <a href="manage-packages.html" class="admin-nav__link admin-nav__link--active">Manage Packages</a>
          <a href="index.html" class="admin-nav__link admin-nav__link--logout">Log Out</a>
        </nav>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-header__greeting">
            <h1>Manage Packages</h1>
            <p>Create, edit, or hide your valeting and detailing services here.</p>
          </div>
          <button class="btn btn--primary" id="openModalBtn">
            + Add New Package
          </button>
        </header>

        <section class="admin-content">
          <div class="admin-card">
            <h2>Full Service Menu</h2>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Package Name</th>
                  <th>Base Price</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="packageTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- THE MODAL -->
    <div class="admin-modal" id="addPackageModal">
      <div class="admin-modal__content">
        <div class="admin-modal__header">
          <h2>Create New Package</h2>
          <button class="admin-modal__close" id="closeModalBtn">&times;</button>
        </div>
        <form class="admin-form">
          <div class="admin-form__group">
            <label for="pkg-category">Category</label>
            <select id="pkg-category" class="admin-form__input">
              <option value="valeting">Valeting Menu</option>
              <option value="detailing">Detailing Menu</option>
            </select>
          </div>
          <div class="admin-form__group">
            <label for="pkg-name">Package Name</label>
            <input type="text" id="pkg-name" class="admin-form__input" required />
          </div>
          <div class="admin-form__group">
            <label for="pkg-price">Base Price (£)</label>
            <input type="number" id="pkg-price" class="admin-form__input" required />
          </div>
          <div class="admin-form__group">
            <label for="pkg-desc">Description & Features</label>
            <textarea id="pkg-desc" rows="4" class="admin-form__input admin-form__textarea"></textarea>
          </div>
          <div class="admin-form__group">
            <label for="pkg-status">Status</label>
            <select id="pkg-status" class="admin-form__input">
              <option value="active">Live / Visible to Customers</option>
              <option value="draft">Draft / Hidden</option>
            </select>
          </div>
          <div class="admin-form__actions">
            <button type="button" class="btn" id="cancelModalBtn">Cancel</button>
            <button type="submit" class="btn btn--primary">Save Package</button>
          </div>
        </form>
      </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
      const modal = document.getElementById("addPackageModal");
      const openBtn = document.getElementById("openModalBtn");
      const closeBtn = document.getElementById("closeModalBtn");
      const cancelBtn = document.getElementById("cancelModalBtn");
      const form = document.querySelector(".admin-form");
      let currentEditId = null;

      const closeModal = () => {
        modal.classList.remove("admin-modal--active");
        form.reset();
        currentEditId = null; 
        document.querySelector(".admin-modal__header h2").innerText = "Create New Package";
      };

      openBtn.addEventListener("click", () => {
        currentEditId = null;
        document.querySelector(".admin-modal__header h2").innerText = "Create New Package";
        modal.classList.add("admin-modal--active");
      });

      closeBtn.addEventListener("click", closeModal);
      cancelBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });

      const tableBody = document.getElementById("packageTableBody");

      const loadPackages = async () => {
        try {
          const response = await fetch("https://truegloss.onrender.com/api/packages");
          const packages = await response.json();
          tableBody.innerHTML = "";
          packages.forEach((pkg) => {
            const statusClass = pkg.status === "active" ? "status--active" : "status--draft";
            const statusText = pkg.status === "active" ? "Live" : "Draft";
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${pkg.name} <span style="font-size: 0.8em; color: gray;">(${pkg.category})</span></td>
              <td>£${parseFloat(pkg.price).toFixed(2)}</td>
              <td><span class="status ${statusClass}">${statusText}</span></td>
              <td>
                  <a href="#" class="action-link" onclick="editPackage(${pkg.id})">Edit</a> | 
                  <a href="#" class="action-link delete" onclick="deletePackage(${pkg.id})">Delete</a>
              </td>
            `;
            tableBody.appendChild(row);
          });
        } catch (error) { console.error("Error loading packages:", error); }
      };

      const deletePackage = async (id) => {
        if (!confirm("Are you sure you want to delete this package?")) return;
        try {
          await fetch(`https://truegloss.onrender.com/api/packages/${id}`, { method: "DELETE" });
          loadPackages();
        } catch (error) { console.error("Error deleting:", error); }
      };

      const editPackage = async (id) => {
        try {
          const response = await fetch(`https://truegloss.onrender.com/api/packages/${id}`);
          const pkg = await response.json();
          document.getElementById("pkg-name").value = pkg.name;
          document.getElementById("pkg-price").value = pkg.price;
          document.getElementById("pkg-desc").value = pkg.description;
          document.getElementById("pkg-status").value = pkg.status;
          document.getElementById("pkg-category").value = pkg.category;
          
          currentEditId = id;
          document.querySelector(".admin-modal__header h2").innerText = "Edit Package";
          modal.classList.add("admin-modal--active");
        } catch (error) { console.error("Error fetching package:", error); }
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const packageData = {
          name: document.getElementById("pkg-name").value,
          price: document.getElementById("pkg-price").value,
          description: document.getElementById("pkg-desc").value,
          status: document.getElementById("pkg-status").value,
          category: document.getElementById("pkg-category").value,
        };

        try {
          const url = currentEditId ? `https://truegloss.onrender.com/api/packages/${currentEditId}` : "https://truegloss.onrender.com/api/packages";
          const method = currentEditId ? "PUT" : "POST";
          await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(packageData),
          });
          closeModal();
          loadPackages();
        } catch (error) { console.error("Server communication error:", error); }
      });

      loadPackages();
    </script>
  </body>
</html>
